<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CrosswordChat</title>
  <!-- Shown when the action icon is clicked on a page CrosswordChat doesn't support
       (REQ-LIFE-014). Static HTML only: no scripts, no network, nothing read from
       the page (REQ-NFR-001/002). On supported puzzle pages there is no popup — the
       click starts or stops the session directly. -->
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; width: 280px; color: #191919; }
    h1 { font-size: 15px; margin: 0 0 10px; }
    p { font-size: 13px; line-height: 1.45; margin: 0 0 10px; color: #3d3d3d; }
    p:last-child { margin-bottom: 0; }
    .works { background: #faf6ec; border: 1px solid #e7dfc8; border-radius: 8px; padding: 8px 10px; }
    a { color: #191919; font-weight: 600; }
  </style>
</head>
<body>
  <h1>CrosswordChat isn&rsquo;t supported on this site.</h1>
  <p class="works">It works on the New York Times crosswords &mdash; the Mini, the Midi,
    and the daily puzzle &mdash; where you&rsquo;ll find its speech-bubble button right
    in the puzzle toolbar.</p>
  <p>Is there a crossword on this page? Ask us to support it:<br>
    <a href="mailto:crosswords@missingbulb.com">crosswords@missingbulb.com</a></p>
</body>
</html>
